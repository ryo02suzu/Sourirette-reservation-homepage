name: Deploy to GitHub Pages

on:
  # 開発ブランチ / main への push で自動デプロイ
  push:
    branches:
      - main
      - claude/reservation-homepage-p6lwK
  # 手動実行も可能
  workflow_dispatch:

# GITHUB_TOKEN に Pages へのデプロイ権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに制限（古いデプロイは待たずキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # リポジトリ名に応じて base を自動決定：
        #   <owner>.github.io（ユーザーサイト）→ ルート配信なので "/"
        #   それ以外（プロジェクトページ）       → "/<repo>/"
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [ "$REPO_NAME" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            export VITE_BASE="/"
          else
            export VITE_BASE="/${REPO_NAME}/"
          fi
          echo "Using VITE_BASE=$VITE_BASE"
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
